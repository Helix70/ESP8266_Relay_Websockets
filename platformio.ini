; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
board_build.filesystem = littlefs
framework = arduino
extra_scripts = pre:scripts/pio_custom_targets.py
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

[common_esp8266]
extends = common
platform = espressif8266
board = esp12e
board_build.partitions = partition.csv
lib_deps =
	me-no-dev/ESPAsyncWebServer@^1.2.3
	me-no-dev/ESPAsyncTCP@^1.2.2
	bblanchon/ArduinoJson@^7.2.2
build_flags = -Wno-deprecated-declarations
upload_speed = 1500000
; build_type = debug
; monitor_filters = esp8266_exception_decoder

[common_esp32]
extends = common
platform = espressif32
board = espino32
board_build.partitions = default.csv
lib_deps =
	esp32async/ESPAsyncWebServer@^3.11.2
	bblanchon/ArduinoJson@^7.2.2
upload_speed = 1500000

[env:esp8266_serial_8relay]
extends = common_esp8266
monitor_port = COM4
upload_port = COM4

[env:esp8266_serial_16relay]
extends = common_esp8266
monitor_port = COM6
upload_port = COM6

[env:esp8266_ota_8relay]
extends = common_esp8266
upload_protocol = espota
upload_port = 192.168.2.217

[env:esp8266_ota_16relay]
extends = common_esp8266
upload_protocol = espota
upload_port = 192.168.2.154

[env:esp32_serial_8relay]
extends = common_esp32
monitor_port = COM3
upload_port = COM3

[env:esp32_ota_8relay]
extends = common_esp32
upload_protocol = espota
upload_port = 192.168.2.195
