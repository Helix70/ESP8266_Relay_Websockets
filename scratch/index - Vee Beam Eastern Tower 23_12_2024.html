<!DOCTYPE HTML>
<html>

<head>
  <title>Vee Beam Eastern Tower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <div class="topnav">
    <h1>Vee Beam Eastern Tower (Amp - Ant 2b)</h1>
  </div>
  <table>
    <tr>
      <td class="card">
        <p><button id="relay1toggle" class="button"><span class="on">Relay 1 On</span><span class="off">Relay 1 Off</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay2toggle" class="button"><span class="on">Fan Dipole * / Vee Beam</span><span class="off">Fan Dipole / Vee Beam *</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay3toggle" class="button"><span class="on">120&Omega;</span><span class="off">120&Omega;</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay4toggle" class="button"><span class="on">75&Omega;</span><span class="off">75&Omega;</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay5toggle" class="button"><span class="on">50&Omega;</span><span class="off">50&Omega;</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay6toggle" class="button"><span class="on">40&Omega;</span><span class="off">40&Omega;</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay7toggle" class="button"><span class="on">120&deg; / 60&deg; *</span><span class="off">120&deg; * / 60&deg;</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay8toggle" class="button"><span class="on">120&deg; / 180&deg; *</span><span class="off">120&deg; * / 180&deg;</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="alloff" class="button">All Relays Off</button></p>
      </td>
      <td class="card">
        <p><button id="home" class="button">Refresh</button></p>
      </td>
    </tr>
    <script src="script.js"></script>
</body>
</html>
