<!DOCTYPE HTML>
<html>

<head>
  <title>Western Tower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <div class="topnav">
    <h1>Western Tower</h1>
  </div>
  <table>
    <tr>
      <td class="card">
        <p><button id="relay1toggle" class="button"><span class="on">HF9V - V Beam  / 6M Yagi *</span><span class="off">HF9V - V Beam */ 6M Yagi  </span></button></p>
      </td>
      <td class="card">
        <p><button id="relay2toggle" class="button"><span class="on">HF9V * - V Beam  </span><span class="off">HF9V   - V Beam *</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay3toggle" class="button"><span class="on">120&Omega;</span><span class="off">120&Omega;</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay4toggle" class="button"><span class="on">75&Omega;</span><span class="off">75&Omega;</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay5toggle" class="button"><span class="on">50&Omega;</span><span class="off">50&Omega;</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay6toggle" class="button"><span class="on">40&Omega;</span><span class="off">40&Omega;</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="relay7toggle" class="button"><span class="on">Positive</span><span class="off">0V (+)</span></button></p>
      </td>
      <td class="card">
        <p><button id="relay8toggle" class="button"><span class="on">Negative</span><span class="off">0V (-)</span></button></p>
      </td>
    </tr>
    <tr>
      <td class="card">
        <p><button id="alloff" class="button">All Relays Off</button></p>
      </td>
      <td class="card">
        <p><button id="home" class="button">Refresh</button></p>
      </td>
    </tr>
    <script src="script.js"></script>
</body>
</html>
