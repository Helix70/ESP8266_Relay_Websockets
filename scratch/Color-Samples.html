<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 Premium Web UI Color Frameworks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; transition: background 0.25s, color 0.25s, border-color 0.25s; }
        body { padding: 40px 20px; background-color: #f3f4f6; color: #111827; text-align: center; }
        body.dark-mode { background-color: #0b0f19; color: #f9fafb; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { margin-top: 5px; font-size: 1.05rem; opacity: 0.7; }
        
        #theme-toggle { padding: 12px 30px; font-size: 1rem; font-weight: 700; border: none; border-radius: 30px; cursor: pointer; background-color: #000; color: #fff; margin: 20px 0 40px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        body.dark-mode #theme-toggle { background-color: #fff; color: #000; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 35px; max-width: 1440px; margin: 0 auto; text-align: left; }
        .section-title { font-size: 1.4rem; font-weight: 800; width: 100%; margin: 50px 0 15px 0; padding-bottom: 10px; border-bottom: 2px solid #e5e7eb; grid-column: 1 / -1; text-transform: uppercase; letter-spacing: 0.5px; }
        body.dark-mode .section-title { border-bottom-color: #242b3d; }
        
        /* Layout Grid Cards */
        .card-container { display: flex; flex-direction: column; gap: 8px; }
        .scheme-info { font-size: 0.9rem; font-weight: 700; opacity: 0.8; padding-left: 2px; }
        .card { border-radius: 16px; border: 2px solid transparent; display: flex; flex-direction: column; min-height: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); overflow: hidden; }
        
        /* Contained Header Banners */
        .header-banner { padding: 20px; font-size: 1.1rem; font-weight: 700; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* Inner Component Content spacing */
        .card-content { padding: 24px; display: flex; flex-direction: column; gap: 18px; flex-grow: 1; }
        .card p { font-size: 0.9rem; line-height: 1.45; opacity: 0.85; }
        
        /* Input & Form controls */
        .edit-box-wrapper { display: flex; flex-direction: column; gap: 5px; }
        .edit-box-wrapper label { font-size: 0.75rem; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        .input-box { width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; border: 2px solid; font-weight: 500; outline: none; background: transparent; }
        
        /* Buttons Group alignment */
        .btn-group { display: flex; gap: 12px; margin-top: auto; }
        .cta-btn { padding: 10px 18px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; flex-grow: 1; text-align: center; }
    </style>
</head>
<body>

    <h1>Component Color Frameworks</h1>
    <p class="subtitle">Live layout validation detailing 18 distinct theme variations and contrasts.</p>
    <button id="theme-toggle" onclick="toggleTheme()">🔄 Switch to Dark Themes</button>

    <main class="grid" id="main-grid"></main>

    <script>

            // ====== CALM & MINIMAL (Health, Corporate, Editorial) ======

              dark: { bg: "#342B38", border: "#4a3e50", text: "#EBE5DF", bannerBg: "#CBB3BA", bannerTxt: "#342B38", btn1Bg: "#CBB3BA", btn1Txt: "#342B38", btn2Bg: "#8AA399", btn2Txt: "#ffffff" } },
            // ====== PREMIUM & MODERN (Tech, Luxury, Fashion, Creative) ======

              dark: { bg: "#004D54", border: "#006d75", text: "#F3EFE0", bannerBg: "#D62246", bannerTxt: "#ffffff", btn1Bg: "#83C5BE", btn1Txt: "#004D54", btn2Bg: "#D62246", btn2Txt: "#ffffff" } },

              light: { bg: "#D7EFFF", border: "#A2D2FF", text: "#0A2240", bannerBg: "#0A2240", bannerTxt: "#D7EFFF", btn1Bg: "#0077B6", btn1Txt: "#ffffff", btn2Bg: "#FFB703", btn2Txt: "#0A2240" }, 
              dark: { bg: "#0A2240", border: "#12345c", text: "#A2D2FF", bannerBg: "#A2D2FF", bannerTxt: "#0A2240", btn1Bg: "#0077B6", btn1Txt: "#ffffff", btn2Bg: "#FFB703", btn2Txt: "#0A2240" } },

            { id: 17, name: "Purple Rain", type: "Premium & Modern", 
              light: { bg: "#EBE8F5", border: "#8B72A8", text: "#2B1F3D", bannerBg: "#2B1F3D", bannerTxt: "#EBE8F5", btn1Bg: "#D8315B", btn1Txt: "#ffffff", btn2Bg: "#00b4d8", btn2Txt: "#ffffff" }, 
              dark: { bg: "#2B1F3D", border: "#41305c", text: "#8B72A8", bannerBg: "#8B72A8", bannerTxt: "#2B1F3D", btn1Bg: "#D8315B", btn1Txt: "#ffffff", btn2Bg: "#00b4d8", btn2Txt: "#2B1F3D" } },

            { id: 18, name: "Warm Suede Luxury", type: "Premium & Modern", 
              light: { bg: "#F3EBE5", border: "#7A5C4A", text: "#382B22", bannerBg: "#382B22", bannerTxt: "#F3EBE5", btn1Bg: "#C8A165", btn1Txt: "#ffffff", btn2Bg: "#466060", btn2Txt: "#ffffff" }, 
              dark: { bg: "#382B22", border: "#544033", text: "#F3EBE5", bannerBg: "#C8A165", bannerTxt: "#382B22", btn1Bg: "#C8A165", btn1Txt: "#382B22", btn2Bg: "#466060", btn2Txt: "#ffffff" } }
        ];
        let isDarkMode = false;

        function renderCards() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            let currentSection = "";

            schemes.forEach(scheme => {
                if (scheme.type !== currentSection) {
                    currentSection = scheme.type;
                    const header = document.createElement('div');
                    header.className = 'section-title';
                    header.innerText = currentSection;
                    grid.appendChild(header);
                }

                const data = isDarkMode ? scheme.dark : scheme.light;
                const container = document.createElement('div');
                container.className = 'card-container';
                
                container.innerHTML = `
                    <div class="scheme-info">Scheme ${scheme.id}: ${scheme.name}</div>
                    <div class="card" style="background-color: ${data.bg}; border-color: ${data.border}; color: ${data.text}">
                        
                        <div class="header-banner" style="background-color: ${data.bannerBg}; color: ${data.bannerTxt}">
                            High Contrast Header Banner
                        </div>

                        <div class="card-content">
                            <p>This layout visualises the theme architecture. The card body base style displays deep input edit spaces and active button pairings cleanly.</p>
                            
                            <div class="edit-box-wrapper">
                                <label>Form Input Field</label>
                                <input type="text" class="input-box" placeholder="Enter text here..." 
                                    style="border-color: ${data.border}; color: ${data.text};">
                            </div>

                            <div class="btn-group">
                                <button class="cta-btn" style="background-color: ${data.btn1Bg}; color: ${data.btn1Txt}">Primary Action</button>
                                <button class="cta-btn" style="background-color: ${data.btn2Bg}; color: ${data.btn2Txt}">Secondary State</button>
                            </div>
                        </div>

                    </div>
                `;
                grid.appendChild(container);
            });
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-toggle').innerText = isDarkMode ? "🔄 Switch to Light Themes" : "🔄 Switch to Dark Themes";
            renderCards();
        }

        renderCards();
    </script>
</body>
</html>
