<!DOCTYPE HTML>
<html>

<head>
  <title>Relay Board - Template Manager</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css?v=20260704c">
  <script src="theme-apply.js?v=20260704b"></script>
</head>

<body>
  <div class="topnav">
    <h1>Template Manager</h1>
  </div>

  <div class="labels-page" data-loading="true">
    <div class="template-section">
      <h3 class="template-section-title">Templates</h3>
      <div class="template-row template-primary-row">
        <select id="templateSelect" class="template-select">
          <option value="">-- Select a template --</option>
        </select>
        <button id="setActiveTemplateButton" class="button button-inline">Set Active</button>
        <button id="openTemplateEditorButton" class="button button-inline">Edit</button>
      </div>

      <div class="template-file-actions">
        <p class="template-subtitle">File Actions</p>
        <div class="template-row template-actions-row">
          <button id="uploadTemplateButton" class="button button-inline">Upload</button>
          <button id="downloadTemplateButton" class="button button-inline">Download</button>
          <button id="renameTemplateButton" class="button button-inline">Rename</button>
          <button id="deleteTemplateButton" class="button button-inline">Remove</button>
        </div>
        <input type="file" id="templateUploadInput" class="template-upload-input-hidden" accept="application/json,.json">
      </div>
      <p id="templateSelectionStatus" class="config-note">Selected template: none</p>
      <p id="templateDiagnosticsStatus" class="config-note">Template storage: loading...</p>

      <div id="templateSummary" class="template-summary" aria-live="polite">
        <p class="template-summary-empty">Select a template to view relay summary.</p>
      </div>
    </div>

    <div class="config-buttons">
      <p><button id="backLabelsButton" class="button">Back</button></p>
    </div>
  </div>

  <script src="relay-config.js?v=20260704c"></script>
</body>

</html>
