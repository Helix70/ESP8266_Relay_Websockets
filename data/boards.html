<!DOCTYPE HTML>
<html>

<head>
  <title>Relay Board - Board Manager</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script>
  // Inlined from theme-apply.js: was a separate static-file request that cost
  // ~1500-2300 bytes of ESP8266 heap not recovered by the next request (see
  // src/CLAUDE.md). Duplicated identically across all 6 HTML pages in data/ --
  // if you edit this logic, update every copy (grep "Inlined from theme-apply.js").
  (function () {
    var LS = 'rly_theme';
    var LS_STYLE = 'rly_btnstyle';
    function apply(h) {
      var s = document.documentElement.style;
      s.setProperty('--clr-bg',      h[0]);
      s.setProperty('--clr-primary', h[1]);
      s.setProperty('--clr-accent',  h[2]);
      s.setProperty('--clr-active',  h[3]);
      s.setProperty('--clr-text',       h[4] || h[1]);
      s.setProperty('--clr-banner',     h[5] || h[2]);
      s.setProperty('--clr-banner-txt', h[6] || '#ffffff');
      s.setProperty('--clr-btn1-txt',   h[7] || '#ffffff');
      s.setProperty('--clr-btn2-txt',   h[8] || '#ffffff');
    }
    function applyStyle(styleId) {
      if (styleId && styleId !== 'classic') {
        document.documentElement.setAttribute('data-btnstyle', styleId);
      } else {
        document.documentElement.removeAttribute('data-btnstyle');
      }
    }
    var cachedColors = null;
    var cachedStyle = null;
    try {
      var c = localStorage.getItem(LS);
      if (c) { cachedColors = JSON.parse(c); apply(cachedColors); }
      cachedStyle = localStorage.getItem(LS_STYLE);
      if (cachedStyle) applyStyle(cachedStyle);
      if (cachedColors && cachedStyle) return;
    } catch (e) {}
    var x = new XMLHttpRequest();
    x.open('GET', '/api/theme', true);
    x.onload = function () {
      if (x.status !== 200) return;
      try {
        var d = JSON.parse(x.responseText);
        if (d.h && !cachedColors) {
          var colors = d.h.split(',');
          if (colors.length >= 4) {
            apply(colors);
            try { localStorage.setItem(LS, JSON.stringify(colors)); } catch (e) {}
          }
        }
        if (!cachedStyle) {
          var styleId = d.s || 'classic';
          applyStyle(styleId);
          try { localStorage.setItem(LS_STYLE, styleId); } catch (e) {}
        }
      } catch (e) {}
    };
    x.send();
  }());

  var bootSessionStorageKey = 'relayBootSessionId:' + window.location.hostname;

  function forceRootRefreshAfterBootChange() {
    var cacheBuster = Date.now();
    window.location.replace('/?refresh=' + cacheBuster);
  }

  function clearRefreshQueryParam() {
    if (!window.history || typeof window.history.replaceState !== 'function') {
      return;
    }

    if (window.location.search.indexOf('refresh=') === -1) {
      return;
    }

    window.history.replaceState(null, '', window.location.pathname + window.location.hash);
  }

  function trackBootSessionAndRedirectIfChanged(payload) {
    if (!payload || !payload.bootSessionId) {
      return false;
    }

    var incomingBootSessionId = String(payload.bootSessionId);
    var previousBootSessionId = '';

    try {
      previousBootSessionId = window.localStorage.getItem(bootSessionStorageKey) || '';
    } catch (e) {
      previousBootSessionId = '';
    }

    try {
      window.localStorage.setItem(bootSessionStorageKey, incomingBootSessionId);
    } catch (e) {
      // Ignore storage failures; the page still works without boot tracking.
    }

    if (previousBootSessionId && previousBootSessionId !== incomingBootSessionId) {
      forceRootRefreshAfterBootChange();
      return true;
    }

    return false;
  }
  </script>
</head>

<body>
  <div class="topnav">
    <h1>Board Manager</h1>
  </div>

  <div class="labels-page" data-loading="true">
    <div class="template-section">
      <h3 class="template-section-title">Boards</h3>
      <div class="template-row template-primary-row">
        <select id="boardSelect" class="template-select">
          <option value="">-- Select a board --</option>
        </select>
        <button id="setActiveBoardButton" class="button button-inline" type="button">Set Active</button>
        <button id="editBoardButton" class="button button-inline" type="button">Edit</button>
      </div>

      <div class="template-file-actions">
        <p class="template-subtitle">File Actions</p>
        <div class="template-row template-actions-row">
          <button id="newBoardButton" class="button button-inline" type="button">New</button>
          <button id="uploadBoardButton" class="button button-inline" type="button">Upload</button>
          <button id="downloadBoardButton" class="button button-inline" type="button">Download</button>
          <button id="renameBoardButton" class="button button-inline" type="button">Rename</button>
          <button id="deleteBoardButton" class="button button-inline" type="button">Remove</button>
        </div>
        <input id="boardUploadInput" type="file" accept=".json,application/json" style="display:none">
      </div>
      <p id="boardStatus" class="config-note">Selected board: none</p>
      <p id="activeBoardInfo" class="config-note">Connecting&hellip;</p>

      <div id="boardEditorHost"></div>
    </div>

    <div class="config-buttons">
      <p><button id="backButton" class="button">Back</button></p>
    </div>
  </div>

  <script src="boards.js"></script>
</body>

</html>
